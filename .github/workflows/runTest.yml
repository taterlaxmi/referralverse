name: Run Automation Tests (Unit Test & Lighthouse Analysis)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *' # Daily at Midnight UTC

jobs:
  run-tests:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'latest'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run Unit Tests (SEO & Data)
        run: npm test -- --reporter=json --outputFile=vitest-results.json

      - name: Build project
        run: npm run build

      - name: Run Lighthouse Audit
        run: |
          npx lhci autorun
        env:
          LHCI_URL: 'http://localhost:3000'

      - name: Run SEO & AI Audit
        run: node scripts/site-audit.mjs https://referralverse.in
        env:
          PAGESPEED_API_KEY: ${{ secrets.PAGESPEED_API_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}

      - name: Generate Job Summary
        if: always()
        run: node scripts/generate-test-report.mjs
        env:
          GITHUB_STEP_SUMMARY: ${{ github.step_summary }}
