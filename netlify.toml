[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

# --- Static HTML pages: revalidated by CDN every 10 minutes ---
# s-maxage tells Netlify CDN to cache the page for 10 min (600s).
# max-age=0 tells browsers not to cache stale HTML themselves so they always see fresh content.
# stale-while-revalidate lets CDN serve the cached page while refreshing in background.
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, s-maxage=600, stale-while-revalidate=86400"
    Vary = "Accept-Encoding"

# --- Next.js static assets: immutable for 1 year (they are content-hashed) ---
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# --- Public images and other static files ---
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, stale-while-revalidate=86400"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=2592000, stale-while-revalidate=86400"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=2592000, stale-while-revalidate=86400"

# --- API routes: short cache, always revalidate ---
[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "public, max-age=60, s-maxage=600, stale-while-revalidate=30"
